# AI 热点雷达 Nginx 配置
# 适用于 Ubuntu/Debian: /etc/nginx/sites-available/aihot
# 启用: ln -s /etc/nginx/sites-available/aihot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name aihot.paicoding.com;

    # 静态文件
    root /home/www/aihot;
    index index.html;

    # 日志
    access_log /var/log/nginx/aihot_access.log;
    error_log /var/log/nginx/aihot_error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # 静态文件 + 历史数据
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # JSON 数据不缓存 (每日更新)
    location /data/ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 代理 (转发到 Python 代理服务)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5173/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 微信公众号封面图代理 (解决防盗链)
    location ^~ /wechat-img/ {
        proxy_pass https://mmbiz.qpic.cn/;
        proxy_set_header Host mmbiz.qpic.cn;
        proxy_set_header Referer "https://mp.weixin.qq.com/";
        proxy_cache_valid 200 1d;
        proxy_cache_key "$uri";
    }
}
