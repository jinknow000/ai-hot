name: Daily AI Hot Radar

on:
  schedule:
    # 每天北京时间 11:30 (UTC+8 = 03:30 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: 🤖 每日 AI 热点采集与分析
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: 🤖 运行 DailyAihotAgentRunner
        env:
          REDFOX_API_KEY: ${{ secrets.REDFOX_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python -m src.run_daily_agent --date $(date +%Y-%m-%d)

      - name: ✅ 验证输出
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html 未生成"
            exit 1
          fi
          if [ ! -f dist/data/latest.json ]; then
            echo "❌ dist/data/latest.json 未生成"
            exit 1
          fi

          # 检查数据完整性
          python -c "
          import json
          with open('dist/data/latest.json') as f:
              data = json.load(f)
          platforms = data.get('platforms', {})
          total = sum(p.get('sampleSize', 0) for p in platforms.values())
          print(f'总数据量: {total} 条')
          for name, pdata in platforms.items():
              print(f'  {name}: {pdata.get(\"sampleSize\", 0)} 条, 错误 {len(pdata.get(\"errors\", []))} 个')
          # 只有公众号 0 条才标记失败（抖音/小红书暂不支持关键词搜索）
          wc = platforms.get('wechat', {}).get('sampleSize', 0)
          if wc == 0:
              print('❌ 公众号采集量为 0，标记失败')
              exit(1)
          for pname in ['douyin', 'xiaohongshu']:
              if platforms.get(pname, {}).get('sampleSize', 0) == 0:
                  print(f'⚠️ {pname} 采集量为 0（RedFox API 暂不支持该平台搜索）')
          print('✅ 数据验证通过')
          "

      - name: 📤 上传 GitHub Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: 🚀 部署到 GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    # GitHub Pages 所需权限
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 部署
        id: deployment
        uses: actions/deploy-pages@v4
