# AI 热点雷达 - Gitee 流水线
# 定时采集 → LLM 分析 → Cloudflare Pages 自动部署
# 站点地址: https://ai-hot.pages.dev
version: "1.0"

name: "Daily AI Hot Radar"

# ========== 触发器 ==========
triggers:
  schedule:
    - cron: "30 3 * * *"         # 北京时间 11:30 (UTC+8)
  manual: enable

# ========== 流水线阶段 ==========
stages:
  - stage:
      name: "daily-collect"
      displayName: "每日采集与分析"
      tasks:
        # ----- Step 1: 环境准备 -----
        - task: shell
          displayName: "环境准备"
          inputs:
            script: |
              set -e
              echo "Python: $(python3 --version)"
              echo "Node: $(node --version)"

              python3 -m pip install --upgrade pip --quiet
              pip3 install requests openai --quiet
              npm install -g wrangler --quiet

              echo "环境就绪"

        # ----- Step 2: 采集 + LLM 分析 + 生成站点 -----
        - task: shell
          displayName: "采集数据并分析"
          inputs:
            script: |
              set -e
              export REDFOX_API_KEY="ak_31fa2c7b257c47fab7f84229da48f247"
              export LLM_API_KEY="sk-T-BGJJiZO338gkWaPVOywA"
              export LLM_BASE_URL="https://yx-api.yixiong-tech.com/openai/v1"
              export LLM_MODEL="deepseek-v4-pro"

              DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
              echo "采集日期: $DATE"

              python3 -m src.run_daily_agent --date "$DATE"

              if [ ! -f dist/index.html ]; then
                echo "站点生成失败"
                exit 1
              fi

              python3 -c "
              import json
              with open('dist/data/latest.json') as f:
                  data = json.load(f)
              ps = data.get('platforms', {})
              total = sum(p.get('sampleSize', 0) for p in ps.values())
              print(f'总数据: {total} 条')
              wc = ps.get('wechat', {}).get('sampleSize', 0)
              if wc == 0:
                  print('公众号采集量为 0')
                  exit(1)
              print('数据验证通过')
              "
              echo "采集分析完成"

        # ----- Step 3: 部署到 Cloudflare Pages -----
        - task: shell
          displayName: "部署到 Cloudflare Pages"
          inputs:
            script: |
              set -e
              export CLOUDFLARE_API_TOKEN="cfut_B1bH5ayOog5t5virlh2zrK31YAvUxud2WuZAcE6qd71515b0"
              export CLOUDFLARE_ACCOUNT_ID="5831b786b959cfc2fcd5a273fb5bbc7d"

              echo "部署到 Cloudflare Pages..."
              npx wrangler pages deploy ./dist --project-name=ai-hot --commit-dirty=true

              echo "部署完成: https://ai-hot.pages.dev"
