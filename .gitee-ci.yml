# AI 热点雷达 - Gitee 流水线
# Python 插件自动运行 main.py (采集 + LLM 分析 + 构建)
# 站点地址: https://ai-hot.pages.dev
version: "1.0"

name: "Daily AI Hot Radar"

# ========== 触发器 ==========
triggers:
  schedule:
    - cron: "30 3 * * *"         # 北京时间 11:30 (UTC+8)
  manual: enable

# ========== 流水线阶段 ==========
stages:
  - stage:
      name: "deploy"
      displayName: "部署到 Cloudflare Pages"
      tasks:
        - task: shell
          displayName: "部署"
          inputs:
            script: |
              set -e

              if [ ! -f dist/index.html ]; then
                echo "❌ dist/index.html 不存在，流水线可能未生成站点"
                exit 1
              fi

              echo "总数据:"
              python3 -c "
              import json
              with open('dist/data/latest.json') as f:
                  data = json.load(f)
              ps = data.get('platforms', {})
              for name, pdata in ps.items():
                  print(f'  {name}: {pdata.get(\"sampleSize\", 0)} 条')
              "

              export CLOUDFLARE_API_TOKEN="cfut_voDIS1MkWvEC6OHR0Am1bLGEQuDugSwwtjboNwtm28767e9e"
              export CLOUDFLARE_ACCOUNT_ID="5831b786b959cfc2fcd5a273fb5bbc7d"

              npm install -g wrangler --quiet
              npx wrangler pages deploy ./dist --project-name=ai-hot --commit-dirty=true
              echo "✅ 部署完成: https://ai-hot.pages.dev"
