# AI 热点雷达 - Gitee 流水线（无服务器版）
# 定时采集 → LLM 分析 → 提交回仓库 → Gitee Pages 自动部署
# 站点地址: https://你的用户名.gitee.io/ai-hot
version: "1.0"

name: "Daily AI Hot Radar"

# ========== 触发器 ==========
# 仅定时 + 手动，不监听 push（避免 CI 自己提交触发死循环）
triggers:
  schedule:
    - cron: "30 3 * * *"         # 北京时间 11:30 (UTC+8 → 03:30 UTC)
  manual: enable

# ========== 流水线阶段 ==========
stages:
  - stage:
      name: "daily-collect"
      displayName: "每日采集与分析"
      tasks:
        # ----- Step 1: 环境准备 -----
        - task: shell
          displayName: "环境准备"
          inputs:
            script: |
              set -e
              echo "🐍 Python: $(python3 --version)"
              echo "📦 Git: $(git --version)"

              python3 -m pip install --upgrade pip --quiet
              pip install requests openai --quiet

              # 配置 git 身份（用于后续提交）
              git config user.name "AI Hot Bot"
              git config user.email "aihot-bot@noreply.gitee.com"

              echo "✅ 环境就绪"

        # ----- Step 2: 采集 + LLM 分析 + 生成站点 -----
        - task: shell
          displayName: "采集数据并分析"
          inputs:
            script: |
              set -e
              export REDFOX_API_KEY="${REDFOX_API_KEY}"
              export LLM_API_KEY="${LLM_API_KEY}"
              export LLM_BASE_URL="${LLM_BASE_URL:-https://api.deepseek.com}"
              export LLM_MODEL="${LLM_MODEL:-deepseek-chat}"

              DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
              echo "📅 采集日期: $DATE"

              python3 -m src.run_daily_agent --date "$DATE"

              # 验证
              if [ ! -f dist/index.html ]; then
                echo "❌ 站点生成失败"
                exit 1
              fi

              python3 -c "
              import json
              with open('dist/data/latest.json') as f:
                  data = json.load(f)
              ps = data.get('platforms', {})
              total = sum(p.get('sampleSize', 0) for p in ps.values())
              print(f'总数据: {total} 条')
              for n, p in ps.items():
                  print(f'   {n}: {p.get(\"sampleSize\", 0)} 条')
              wc = ps.get('wechat', {}).get('sampleSize', 0)
              if wc == 0:
                  print('公众号采集量为 0')
                  exit(1)
              print('数据验证通过')
              "
              echo "✅ 采集分析完成"

        # ----- Step 3: 提交到 pages 分支 + 触发部署 -----
        - task: shell
          displayName: "部署到 Gitee Pages"
          inputs:
            script: |
              set -e

              # ---------- 3a. 推送站点文件到 pages 分支 ----------
              echo "📤 提交站点文件到 pages 分支..."

              # 保存当前 dist 内容
              cp -r dist /tmp/dist_out

              # 切换到 pages 分支（不存在则创建）
              git fetch origin pages 2>/dev/null || true
              if git show-ref --verify --quiet refs/remotes/origin/pages; then
                git checkout pages
                git reset --hard origin/pages
              else
                git checkout --orphan pages
                git rm -rf . 2>/dev/null || true
              fi

              # 清空 + 复制新文件
              rm -rf ./*
              cp -r /tmp/dist_out/* .
              # .nojekyll 防止 Gitee Pages 忽略以下划线开头的文件
              touch .nojekyll

              git add -A

              if git diff --cached --quiet; then
                echo "⏭️  内容无变化，跳过提交"
              else
                git commit -m "auto: daily update [$DATE] [skip ci]"
                git push https://oauth2:${GITEE_ACCESS_TOKEN}@gitee.com/${GITEE_REPO}.git pages --force
                echo "✅ 已推送到 pages 分支"
              fi

              # 切回 master
              git checkout master 2>/dev/null || git checkout main

              # ---------- 3b. 触发 Gitee Pages 自动更新 ----------
              echo "🚀 触发 Gitee Pages 部署..."

              RESP=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Content-Type: application/json" \
                -H "Authorization: token ${GITEE_ACCESS_TOKEN}" \
                "https://gitee.com/api/v5/repos/${GITEE_REPO}/pages/builds")

              HTTP_CODE=$(echo "$RESP" | tail -1)
              BODY=$(echo "$RESP" | head -n -1)

              if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Gitee Pages 部署已触发"
                echo "   ${BODY}"
              else
                echo "⚠️  Pages API 返回 $HTTP_CODE: ${BODY}"
                echo "   请手动到仓库设置 → Gitee Pages → 点击更新"
              fi
