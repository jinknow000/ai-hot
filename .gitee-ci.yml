# AI 热点雷达 - Gitee 流水线（无服务器版）
# 定时采集 → LLM 分析 → 提交回仓库 → Gitee Pages 自动部署
# 站点地址: https://jinknow000.gitee.io/ai-hot
version: "1.0"

name: "Daily AI Hot Radar"

# ========== 触发器 ==========
triggers:
  schedule:
    - cron: "30 3 * * *"         # 北京时间 11:30 (UTC+8)
  manual: enable

# ========== 流水线阶段 ==========
stages:
  - stage:
      name: "daily-collect"
      displayName: "每日采集与分析"
      tasks:
        # ----- Step 1: 环境准备 -----
        - task: shell
          displayName: "环境准备"
          inputs:
            script: |
              set -e
              echo "Python: $(python3 --version)"
              echo "Git: $(git --version)"

              python3 -m pip install --upgrade pip --quiet
              pip install requests openai --quiet

              git config user.name "AI Hot Bot"
              git config user.email "aihot-bot@noreply.gitee.com"

              echo "环境就绪"

        # ----- Step 2: 采集 + LLM 分析 + 生成站点 -----
        - task: shell
          displayName: "采集数据并分析"
          inputs:
            script: |
              set -e
              export REDFOX_API_KEY="ak_31fa2c7b257c47fab7f84229da48f247"
              export LLM_API_KEY="sk-T-BGJJiZO338gkWaPVOywA"
              export LLM_BASE_URL="https://yx-api.yixiong-tech.com/openai/v1"
              export LLM_MODEL="deepseek-chat"

              DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
              echo "采集日期: $DATE"

              python3 -m src.run_daily_agent --date "$DATE"

              if [ ! -f dist/index.html ]; then
                echo "站点生成失败"
                exit 1
              fi

              python3 -c "
              import json
              with open('dist/data/latest.json') as f:
                  data = json.load(f)
              ps = data.get('platforms', {})
              total = sum(p.get('sampleSize', 0) for p in ps.values())
              print(f'总数据: {total} 条')
              wc = ps.get('wechat', {}).get('sampleSize', 0)
              if wc == 0:
                  print('公众号采集量为 0')
                  exit(1)
              print('数据验证通过')
              "
              echo "采集分析完成"

        # ----- Step 3: 提交到 pages 分支 + 触发部署 -----
        - task: shell
          displayName: "部署到 Gitee Pages"
          inputs:
            script: |
              set -e

              echo "提交站点文件到 pages 分支..."

              # 保存 dist 内容
              cp -r dist /tmp/dist_out

              # 切换到 pages 分支
              git fetch origin pages 2>/dev/null || true
              if git show-ref --verify --quiet refs/remotes/origin/pages; then
                git checkout pages
                git reset --hard origin/pages
              else
                git checkout --orphan pages
                git rm -rf . 2>/dev/null || true
              fi

              # 清空 + 复制新文件
              rm -rf ./*
              cp -r /tmp/dist_out/* .
              touch .nojekyll

              git add -A

              if git diff --cached --quiet; then
                echo "内容无变化，跳过提交"
              else
                git commit -m "auto: daily update [$DATE] [skip ci]"
                git push https://oauth2:ca973de48e848ba8b30bf7e810d7db97@gitee.com/jinknow000/ai-hot.git pages --force
                echo "已推送到 pages 分支"
              fi

              # 切回 master
              git checkout master 2>/dev/null || git checkout main

              # 触发 Gitee Pages 部署
              echo "触发 Gitee Pages 部署..."

              RESP=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Content-Type: application/json" \
                -H "Authorization: token ca973de48e848ba8b30bf7e810d7db97" \
                "https://gitee.com/api/v5/repos/jinknow000/ai-hot/pages/builds")

              HTTP_CODE=$(echo "$RESP" | tail -1)
              BODY=$(echo "$RESP" | head -n -1)

              if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
                echo "Gitee Pages 部署已触发"
              else
                echo "Pages API 返回 $HTTP_CODE: $BODY"
                echo "请手动: 服务 → Gitee Pages → 点击更新"
              fi
