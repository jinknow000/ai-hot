            }
            document.getElementById('dateBadge').textContent = '📅 ' + SITE_DATA.date;
            document.getElementById('buildTime').textContent = SITE_DATA.meta?.buildTime || '-';
            renderStats();
            renderSummary();
            renderTopPicks();
            renderPlatforms();
            renderInsights();
            renderAngles();
            renderQueryCards();
        }

        function renderStats() {
            const p = SITE_DATA.platforms || {};
            const picks = SITE_DATA.analysis?.topPicks || [];
            document.getElementById('statsBar').innerHTML = [
                { n: (p.douyin?.sampleSize || 0) + ' 条', l: '🎵 抖音样本' },
                { n: (p.xiaohongshu?.sampleSize || 0) + ' 条', l: '📕 小红书灵感' },
                { n: (p.wechat?.sampleSize || 0) + ' 条', l: '💬 公众号爆文' },
                { n: picks.length + ' 条', l: '⭐ Agent 推荐' },
            ].map(s => `<div class="stat-card"><div class="number">${s.n}</div><div class="label">${s.l}</div></div>`).join('');
        }

        function renderSummary() {
            const s = SITE_DATA.analysis?.dailySummary || {};
            document.getElementById('summarySection').innerHTML = `
                <div class="section-title">📊 每日摘要</div>
                <div class="summary-card">
                    <div class="overview">${esc(s.overview || '暂无摘要')}</div>
                    <div class="hot-topics">${(s.hotTopics || []).map(t => `<span class="hot-topic-tag">#${esc(t)}</span>`).join('')}</div>
                </div>`;
        }

        function renderTopPicks() {
            const picks = SITE_DATA.analysis?.topPicks || [];
            document.getElementById('topPicksSection').innerHTML = `
                <div class="section-title">⭐ Agent 精选推荐</div>
                ${picks.length ? picks.map((p, i) => `
                <div class="pick-card">
                    <div class="pick-header">
                        <div class="pick-title"><a href="${esc(p.url||'#')}" target="_blank" rel="noopener">${i+1}. ${esc(p.title||'无标题')}</a></div>
                        <div class="score-badge${p.opportunityScore>=80?' high':''}">${p.opportunityScore||'-'}</div>
                    </div>
                    <div class="pick-meta">
                        <span class="platform-tag ${p.platform==='douyin'?'douyin':p.platform==='xiaohongshu'?'xiaohongshu':'wechat'}">${p.platform==='douyin'?'抖音':p.platform==='xiaohongshu'?'小红书':'公众号'}</span>
                        ${p.reason?`<span>📌 ${esc(p.reason)}</span>`:''}
                    </div>
                    ${p.contentAngle?`<div class="pick-detail"><div class="label-text">💡 内容角度</div><div class="content-text">${esc(p.contentAngle)}</div></div>`:''}
                    ${p.riskNote?`<div class="pick-detail"><div class="label-text">⚠️ 风险提示</div><div class="content-text">${esc(p.riskNote)}</div></div>`:''}
                </div>`).join('') : '<div class="summary-card">暂无精选推荐</div>'}`;
        }

        function renderPlatforms() {
            const platforms = SITE_DATA.platforms || {};
            const configs = [
                { key: 'douyin', name: '🎵 抖音样本', cls: 'douyin' },
                { key: 'xiaohongshu', name: '📕 小红书灵感', cls: 'xiaohongshu' },
                { key: 'wechat', name: '💬 公众号爆文', cls: 'wechat' },
            ];
            document.getElementById('platformSection').innerHTML = `
                <div class="section-title">📡 三平台数据面板</div>
                <div class="platform-grid">
                    ${configs.map(c => {
                        const data = platforms[c.key] || {};
                        const items = data.items || [];
                        return `<div class="platform-panel ${c.cls}">
                            <div class="panel-header">${c.name} (${items.length} 条)</div>
                            <div class="panel-body">
                                ${items.length ? items.map(item => `
                                <div class="panel-item">
                                    <div class="item-title"><a href="${esc(item.workUrl||'#')}" target="_blank" rel="noopener">${esc(item.title||'无标题')}</a></div>
                                    <div class="item-meta">
                                        ${item.author?`<span>✍️ ${esc(item.author)}</span>`:''}
                                        ${item.readCount?`<span>👁 ${fmt(item.readCount)}</span>`:''}
                                        ${item.likeCount?`<span>👍 ${fmt(item.likeCount)}</span>`:''}
                                        ${item.wowCount?`<span>👀 ${fmt(item.wowCount)}</span>`:''}
                                        ${item.commentCount?`<span>💬 ${fmt(item.commentCount)}</span>`:''}
                                        ${item.shareCount?`<span>🔄 ${fmt(item.shareCount)}</span>`:''}
                                        ${item.collectCount?`<span>⭐ ${fmt(item.collectCount)}</span>`:''}
                                    </div>
                                </div>`).join('') : '<p style="color:var(--text-secondary);padding:12px 0;">暂无数据</p>'}
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
        }

        function renderInsights() {
            const insights = SITE_DATA.analysis?.platformInsights || {};
            const labels = { douyin: '🎵 抖音', xiaohongshu: '📕 小红书', wechat: '💬 公众号' };
            document.getElementById('insightsSection').innerHTML = `
                <div class="section-title">💡 平台洞察</div>
                ${Object.entries(insights).map(([k,v]) => `<div class="insight-card"><h4>${labels[k]||k}</h4><p>${esc(v)}</p></div>`).join('')}`;
        }

        function renderAngles() {
            const angles = SITE_DATA.analysis?.contentAngles || [];
            const risks = SITE_DATA.analysis?.riskNotes || [];
            document.getElementById('anglesSection').innerHTML = `
                <div class="section-title">🎯 内容角度 & 风险提醒</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div class="summary-card"><h4 style="margin-bottom:12px;">🎯 内容切入角度</h4><ul style="padding-left:20px;color:var(--text-secondary);">${angles.map(a=>`<li style="margin-bottom:6px;">${esc(a)}</li>`).join('')}</ul></div>
                    <div class="summary-card"><h4 style="margin-bottom:12px;">⚠️ 风险提醒</h4><ul style="padding-left:20px;color:var(--text-secondary);">${risks.map(r=>`<li style="margin-bottom:6px;">${esc(r)}</li>`).join('')}</ul></div>
                </div>`;
        }

        function renderQueryCards() {
            const cards = [
                { title: '🔍 搜索公众号文章', fields: ['关键词'] },
                { title: '🔍 搜索公众号', fields: ['公众号名称'] },
                { title: '📋 查询文章列表', fields: ['公众号名称'] },
                { title: '📄 查询文章详情', fields: ['文章 URL'] },
                { title: '📡 查询公众号信息', fields: ['公众号 ID'] },
                { title: '🎵 抖音作品详情', fields: ['作品 ID'] },
                { title: '🎵 抖音账号详情', fields: ['账号 ID'] },
                { title: '📕 小红书作品详情', fields: ['作品 ID'] },
                { title: '📕 小红书账号详情', fields: ['账号 ID'] },
            ];
            document.getElementById('querySection').innerHTML = `
                <div class="section-title">🔍 在线查询 (RedFox API)</div>
                <div class="query-grid">
                    ${cards.map((c, idx) => `
                    <div class="query-card">
                        <h4>${c.title}</h4>
                        ${c.fields.map((f, fi) => `<input type="text" id="q${idx}_f${fi}" placeholder="${f}">`).join('')}
                        <button onclick="doQuery(${idx})">查询</button>
                        <div class="query-result" id="qResult${idx}" style="display:none;"></div>
                    </div>`).join('')}
                </div>`;
            window._queryCards = cards;
        }

        async function doQuery(idx) {
            const card = window._queryCards[idx];
            const rd = document.getElementById('qResult'+idx);
            rd.style.display = 'block';
            rd.textContent = '查询中...';
            const vals = card.fields.map((_, fi) => document.getElementById('q'+idx+'_f'+fi).value);
            if (vals.some(v => !v.trim())) { rd.textContent = '⚠️ 请填写所有参数'; return; }
            try {
                const resp = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: card.endpoint, params: card.body(vals) })
                });
                const data = await resp.json();
                rd.textContent = JSON.stringify(data, null, 2);
            } catch(e) {
                rd.textContent = '⚠️ API 代理服务未连接。请确保后端代理已启动 (/api/proxy)。';
            }
        }

        function fmt(n) { if(!n)return'0'; if(n>=10000)return(n/10000).toFixed(1)+'w'; if(n>=1000)return(n/1000).toFixed(1)+'k'; return String(n); }
        function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
